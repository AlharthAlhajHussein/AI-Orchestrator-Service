services:

  # 1. PostgreSQL: For storing your chat history
  postgres:
    image: pgvector/pgvector:0.8.2-pg18-trixie
    container_name: agents_platform_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql
    networks:
      - backend_private_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $POSTGRES_USER -d $POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # 2. Redis: For caching Agent configurations
  redis:
    image: redis:8.6.1-trixie
    container_name: agents_platform_cache
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: redis-server --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis_data:/data
    networks:
      - backend_private_network


volumes:
  postgres_data:
  redis_data:

networks:
  backend_private_network:
    driver: bridge